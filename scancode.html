<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Cartes d'Embarquement</title>

  <!-- SheetJS pour export Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <!-- html5-qrcode pour la caméra -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
    h1 { text-align: center; color: #00d4ff; margin-bottom: 20px; font-size: 1.3rem; }
    .card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .badge { display: inline-block; background: #0f3460; color: #00d4ff; border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; margin-bottom: 10px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
    #btnCamera { background: #00d4ff; color: #1a1a2e; }
    #btnExport { background: #00b894; color: white; }
    #btnClear  { background: #d63031; color: white; }
    #reader    { width: 100%; border-radius: 10px; overflow: hidden; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
    th { background: #0f3460; color: #00d4ff; padding: 8px 4px; text-align: left; }
    td { padding: 8px 4px; border-bottom: 1px solid #0f3460; }
    tr:nth-child(even) td { background: #0d1b2a; }
    #counter { text-align: center; font-size: 1.5rem; color: #00d4ff; font-weight: bold; }
    #status { text-align: center; color: #00b894; font-size: 0.85rem; min-height: 20px; margin-top: 6px; }
    input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #0f3460; color: white; font-size: 1rem; }
  </style>
</head>
<body>

<h1>✈️ Scan Embarquement</h1>

<!-- Compteur -->
<div class="card" style="text-align:center">
  <div class="badge">PASSAGERS SCANNÉS</div>
  <div id="counter">0</div>
  <div id="status">En attente de scan...</div>
</div>

<!-- Boutons -->
<div class="card">
  <div class="badge">CONTRÔLES</div>
  <button id="btnCamera" onclick="toggleCamera()">📷 Activer la caméra</button>
  <button id="btnExport" onclick="exportExcel()">📊 Exporter Excel</button>
  <button id="btnClear"  onclick="clearData()">🗑️ Vider la liste</button>
</div>

<!-- Lecteur USB : champ caché -->
<input type="text" id="usbInput" placeholder="Ou scannez ici avec lecteur USB..." 
       style="margin-bottom:16px" autocomplete="off">

<!-- Caméra -->
<div class="card" id="cameraCard" style="display:none">
  <div class="badge">CAMÉRA</div>
  <div id="reader"></div>
</div>

<!-- Tableau des passagers -->
<div class="card">
  <div class="badge">LISTE DES PASSAGERS</div>
  <table id="dataTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Nom</th>
        <th>Vol</th>
        <th>De→À</th>
        <th>Siège</th>
        <th>PNR</th>
        <th>Heure</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  let passengers = [];
  let html5QrCode = null;
  let cameraActive = false;

  // ── PARSER BCBP IATA ─────────────────────────────────────────────
  function parseBCBP(raw) {
    raw = raw.trim();
    // Vérification format BCBP (commence par M)
    if (!raw.startsWith('M')) {
      return { raw, passengerName: raw.substring(0, 20).trim(), 
               flightNumber: '?', departure: '?', arrival: '?',
               seatNumber: '?', pnr: '?' };
    }
    try {
      const passengerName   = raw.substring(2, 22).trim().replace('/', ' ');
      const pnr             = raw.substring(23, 30).trim();
      const departure       = raw.substring(30, 33).trim();
      const arrival         = raw.substring(33, 36).trim();
      const carrier         = raw.substring(36, 39).trim();
      const flightNumber    = carrier + raw.substring(39, 44).trim();
      const seatNumber      = raw.substring(48, 52).trim();
      return { raw, passengerName, flightNumber, departure, arrival, seatNumber, pnr };
    } catch(e) {
      return { raw, passengerName: raw.substring(2, 22).trim(), 
               flightNumber: '?', departure: '?', arrival: '?',
               seatNumber: '?', pnr: '?' };
    }
  }

  // ── TRAITEMENT D'UN SCAN ─────────────────────────────────────────
  function processeScan(rawData) {
    if (!rawData || rawData.length < 10) return;
    
    // Évite les doublons rapprochés (même code dans les 3 dernières secondes)
    const last = passengers[passengers.length - 1];
    if (last && last.raw === rawData.trim()) return;

    const data = parseBCBP(rawData);
    data.timestamp = new Date().toLocaleTimeString('fr-FR');
    data.dateStr   = new Date().toLocaleDateString('fr-FR');
    passengers.push(data);

    updateTable(data, passengers.length);
    document.getElementById('counter').textContent = passengers.length;
    document.getElementById('status').textContent = `✅ ${data.passengerName} — ${data.flightNumber}`;

    // Vibration mobile
    if (navigator.vibrate) navigator.vibrate(100);
  }

  // ── MISE À JOUR DU TABLEAU ───────────────────────────────────────
  function updateTable(d, num) {
    const tbody = document.getElementById('tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${num}</td>
      <td>${d.passengerName}</td>
      <td>${d.flightNumber}</td>
      <td>${d.departure}→${d.arrival}</td>
      <td>${d.seatNumber}</td>
      <td>${d.pnr}</td>
      <td>${d.timestamp}</td>`;
    tbody.prepend(tr); // Derniers scans en haut
  }

  // ── LECTEUR USB ──────────────────────────────────────────────────
  const usbInput = document.getElementById('usbInput');
  usbInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      processeScan(usbInput.value);
      usbInput.value = '';
    }
  });
  // Focus auto sur le champ USB
  document.addEventListener('click', () => usbInput.focus());
  usbInput.focus();

  // ── CAMÉRA SMARTPHONE ────────────────────────────────────────────
  function toggleCamera() {
    if (!cameraActive) {
      document.getElementById('cameraCard').style.display = 'block';
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" }, // Caméra arrière
        { fps: 10, qrbox: { width: 280, height: 150 },
          formatsToSupport: [
            Html5QrcodeSupportedFormats.PDF_417,
            Html5QrcodeSupportedFormats.AZTEC,
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.DATA_MATRIX
          ]
        },
        (decodedText) => { processeScan(decodedText); },
        (err) => {}
      ).catch(err => {
        alert("Caméra non accessible : " + err);
      });
      document.getElementById('btnCamera').textContent = '⏹ Arrêter la caméra';
      cameraActive = true;
    } else {
      html5QrCode.stop().then(() => {
        document.getElementById('cameraCard').style.display = 'none';
        document.getElementById('btnCamera').textContent = '📷 Activer la caméra';
        cameraActive = false;
      });
    }
  }

  // ── EXPORT EXCEL ─────────────────────────────────────────────────
  function exportExcel() {
    if (passengers.length === 0) { alert('Aucun passager scanné !'); return; }

    const rows = passengers.map((d, i) => ({
      'N°':         i + 1,
      'Nom':        d.passengerName,
      'Vol':        d.flightNumber,
      'Départ':     d.departure,
      'Arrivée':    d.arrival,
      'Siège':      d.seatNumber,
      'PNR':        d.pnr,
      'Heure scan': d.timestamp,
      'Date':       d.dateStr,
      'Brut BCBP':  d.raw
    }));

    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [
      {wch:5},{wch:25},{wch:10},{wch:8},{wch:8},
      {wch:8},{wch:10},{wch:12},{wch:12},{wch:60}
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Embarquement');

    const date = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `embarquement_${date}.xlsx`);
  }

  // ── VIDER LA LISTE ───────────────────────────────────────────────
  function clearData() {
    if (!confirm(`Supprimer les ${passengers.length} enregistrements ?`)) return;
    passengers = [];
    document.getElementById('tbody').innerHTML = '';
    document.getElementById('counter').textContent = '0';
    document.getElementById('status').textContent = 'Liste vidée.';
  }
</script>
</body>
</html>
