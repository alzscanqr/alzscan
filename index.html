<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alyzia — Scan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --orange:#F07800;--orange-dark:#c45f00;--orange-light:#fff3e0;
      --green:#1a7a4a;--green-light:#e6f9ee;
      --red:#c0392b;--red-light:#fdecea;
      --amber:#b45309;--amber-light:#fffbeb;--amber-border:#f59e0b;
      --gray-50:#f9f9f9;--gray-100:#f0f0f0;--gray-200:#e0e0e0;
      --gray-400:#9e9e9e;--gray-600:#555;--gray-900:#1a1a1a;
      --white:#fff;--font:'Inter',sans-serif;
      --radius-md:14px;--radius-lg:20px;
      --shadow-md:0 4px 16px rgba(0,0,0,.10);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--gray-50);color:var(--gray-900);min-height:100dvh;touch-action:manipulation;-webkit-font-smoothing:antialiased}
    button{cursor:pointer;font-family:var(--font);border:none}

    .topbar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .topbar img{height:32px}
    .topbar-clock{font-size:13px;font-weight:600;color:var(--gray-600);font-variant-numeric:tabular-nums}
    .page{max-width:480px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px}

    /* ── ZONE RÉSULTAT ─────────────────────────────────────── */
    .result-card{
      background:var(--white);border-radius:var(--radius-lg);padding:28px 20px;
      box-shadow:var(--shadow-md);border:3px solid var(--gray-200);text-align:center;
      min-height:210px;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:8px;transition:border-color .25s,background .25s;
    }
    .result-card.ok     {border-color:var(--green);  background:var(--green-light)}
    .result-card.err    {border-color:var(--red);    background:var(--red-light)}
    .result-card.deja   {border-color:var(--amber-border);background:var(--amber-light)}

    /* Waiting */
    .result-waiting{display:flex;flex-direction:column;align-items:center;gap:10px}
    .pulse-ring{width:56px;height:56px;border-radius:50%;border:3px solid var(--orange);animation:pulse 1.8s ease-out infinite;opacity:.5}
    @keyframes pulse{0%{transform:scale(.8);opacity:.6}70%{transform:scale(1.3);opacity:0}100%{transform:scale(1.3);opacity:0}}
    .result-waiting p{font-size:15px;font-weight:600;color:var(--gray-400)}

    /* OK */
    .result-seat{font-size:clamp(3rem,15vw,5rem);font-weight:800;color:var(--orange);line-height:1}
    .result-name{font-size:clamp(1.1rem,4vw,1.5rem);font-weight:700;color:var(--gray-900);line-height:1.2}
    .result-flight{font-size:14px;font-weight:500;color:var(--gray-600);background:var(--gray-100);padding:4px 12px;border-radius:999px;margin-top:4px}

    /* DÉJÀ SCANNÉ */
    .deja-icon{font-size:3rem}
    .deja-title{font-size:1.3rem;font-weight:800;color:var(--amber)}
    .deja-name{font-size:1.1rem;font-weight:700;color:var(--gray-900)}
    .deja-sub{font-size:13px;color:var(--gray-600);margin-top:4px}

    /* ERREUR */
    .err-icon{font-size:3rem}
    .err-msg{font-size:1.1rem;font-weight:700;color:var(--red)}
    .err-sub{font-size:13px;color:var(--gray-600)}

    /* Indicateur envoi */
    .send-indicator{font-size:12px;font-weight:500;color:var(--gray-400);text-align:center;min-height:18px}
    .send-indicator.sending{color:var(--orange)}
    .send-indicator.sent   {color:var(--green)}
    .send-indicator.failed {color:var(--red)}
    .send-indicator.deja   {color:var(--amber)}

    /* Compteur */
    .counter-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:var(--white);border-radius:var(--radius-md);border:1px solid var(--gray-200)}
    .counter-row .num{font-size:2rem;font-weight:800;color:var(--orange);font-variant-numeric:tabular-nums}
    .counter-row .lbl{font-size:13px;color:var(--gray-600);font-weight:500}
    .btn-reset{font-size:11px;color:var(--gray-400);background:var(--gray-100);padding:4px 10px;border-radius:8px;margin-left:8px}

    /* Bouton caméra */
    .btn-camera{width:100%;padding:18px;border-radius:var(--radius-md);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--gray-900);color:var(--white);box-shadow:var(--shadow-md);transition:background .2s,transform .1s}
    .btn-camera:active{transform:scale(.97)}
    .btn-camera.active{background:var(--red)}
    .cam-icon{font-size:1.4rem}
    #cameraCard{display:none;border-radius:var(--radius-md);overflow:hidden;border:2px solid var(--gray-200)}
    #reader{width:100%}

    /* Pill douchette */
    .douchette-pill{display:flex;align-items:center;gap:10px;background:var(--orange-light);border:1.5px dashed var(--orange);border-radius:var(--radius-md);padding:14px 16px}
    .douchette-pill .dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .douchette-pill p{font-size:14px;font-weight:600;color:var(--orange-dark);line-height:1.3}
    .douchette-pill p span{font-weight:400;color:var(--gray-600);font-size:13px}

    /* Bannière reprise caméra */
    .camera-banner{display:none;background:#1a1a2e;color:white;text-align:center;padding:14px;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer}
    .camera-banner.visible{display:block}
  </style>
</head>

<div class="page">

  <!-- Résultat -->
  <div class="result-card" id="resultCard">
    <div class="result-waiting" id="waitingState">
      <div class="pulse-ring"></div>
      <p>EN ATTENTE DU PASSAGER</p>
    </div>
    <!-- OK -->
    <div id="okState" style="display:none;flex-direction:column;align-items:center;gap:8px">
      <div class="result-seat"  id="resSeat"></div>
      <div class="result-name"  id="resName"></div>
      <div class="result-flight" id="resFlight"></div>
    </div>
    <!-- DÉJÀ SCANNÉ -->
    <div id="dejaState" style="display:none;flex-direction:column;align-items:center;gap:6px">
      <div class="deja-icon">⚠️</div>
      <div class="deja-title">DÉJÀ SCANNÉ !</div>
      <div class="deja-name" id="dejaName"></div>
      <div class="deja-sub" id="dejaSub"></div>
    </div>
    <!-- ERREUR -->
    <div id="errState" style="display:none;flex-direction:column;align-items:center;gap:6px">
      <div class="err-icon">❌</div>
      <div class="err-msg">Code barre invalide</div>
      <div class="err-sub">Veuillez réessayer</div>
    </div>
  </div>

  <div class="send-indicator" id="sendIndicator"></div>

  <!-- Compteur -->
  <div class="counter-row">
    <div class="num" id="counter">0</div>
    <div class="lbl">passager(s) cette session</div>
    <button class="btn-reset" onclick="resetCounter()">Remettre à 0</button>
  </div>

  <!-- Bouton caméra -->
  <button class="btn-camera" id="btnCamera" onclick="toggleCamera()">
    <span class="cam-icon">📷</span>
    <span id="btnCameraLabel">UTILISER L'APPAREIL PHOTO</span>
  </button>
  <div class="camera-banner" id="cameraBanner" onclick="restartCamera()">
    📷 Caméra mise en pause — Appuyez ici pour reprendre
  </div>
  <div id="cameraCard"><div id="reader"></div></div>

  <!-- Pill douchette -->
  <div class="douchette-pill">
    <div class="dot"></div>
    <p>DOUCHETTE / SCANNER PRÊT<br>
    <span>Bipez simplement la carte, pas besoin de cliquer</span></p>
  </div>

</div>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, setDoc, getDoc, increment, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDD70vL2HZUpLEGsEDQ8dNar1Hk-zN5Q2o",
    authDomain: "alyzia-embarquement.firebaseapp.com",
    projectId: "alyzia-embarquement",
    storageBucket: "alyzia-embarquement.firebasestorage.app",
    messagingSenderId: "69231416118",
    appId: "1:69231416118:web:fda3af55acd481a8741997"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── ÉTAT ─────────────────────────────────────────────────────
  let scanCount       = parseInt(localStorage.getItem("alyziaCount") || "0");
  let lastRawData     = "";
  let resetTimer      = null;
  let cameraActive    = false;
  let cameraWasActive = false;
  let html5QrCode     = null;

  // Cache local des PNR déjà scannés (clé: flightKey+pnr)
  // Permet une détection instantanée sans attendre Firebase
  const scannedPNRs = new Set(JSON.parse(localStorage.getItem("alyziaScannedPNRs") || "[]"));

  document.getElementById("counter").textContent = scanCount;

  window.resetCounter = function() {
    if (confirm("Remettre le compteur à 0 et vider la liste des scans ?")) {
      scanCount = 0;
      localStorage.setItem("alyziaCount","0");
      localStorage.setItem("alyziaScannedPNRs","[]");
      scannedPNRs.clear();
      document.getElementById("counter").textContent = "0";
    }
  };

  // ── HORLOGE ──────────────────────────────────────────────────
  setInterval(()=>{ document.getElementById("clock").textContent=new Date().toLocaleTimeString("fr-FR"); },1000);
  document.getElementById("clock").textContent=new Date().toLocaleTimeString("fr-FR");

  // ── VERROUILLAGE TÉLÉPHONE ───────────────────────────────────
  document.addEventListener("visibilitychange", async () => {
    if (document.hidden) {
      if (cameraActive && html5QrCode) {
        cameraWasActive = true;
        try { await html5QrCode.stop(); } catch(e) {}
        cameraActive = false;
        document.getElementById("cameraCard").style.display = "none";
      }
    } else if (cameraWasActive) {
      document.getElementById("cameraBanner").classList.add("visible");
      document.getElementById("btnCamera").classList.remove("active");
      document.getElementById("btnCameraLabel").textContent = "UTILISER L'APPAREIL PHOTO";
    }
  });

  window.restartCamera = async function() {
    document.getElementById("cameraBanner").classList.remove("visible");
    cameraWasActive = false;
    await startCamera();
  };

  // ── BIP ───────────────────────────────────────────────────────
  function beep(type) {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if (type==="ok") {
        osc.type="sine"; osc.frequency.setValueAtTime(1200,ctx.currentTime);
        gain.gain.setValueAtTime(0.8,ctx.currentTime);
        osc.start(); osc.stop(ctx.currentTime+0.12);
      } else if (type==="deja") {
        // Double bip basse fréquence = avertissement
        osc.type="sine"; osc.frequency.setValueAtTime(600,ctx.currentTime);
        osc.frequency.setValueAtTime(400,ctx.currentTime+0.15);
        gain.gain.setValueAtTime(0.8,ctx.currentTime);
        osc.start(); osc.stop(ctx.currentTime+0.35);
      } else {
        osc.type="square"; osc.frequency.setValueAtTime(220,ctx.currentTime);
        gain.gain.setValueAtTime(0.5,ctx.currentTime);
        osc.start(); osc.stop(ctx.currentTime+0.25);
      }
    } catch(e) {}
  }

  // ── PARSER BCBP ───────────────────────────────────────────────
  function parseBCBP(raw) {
    raw = raw.trim();
    if (!raw.startsWith("M")) throw new Error("Non-BCBP");
    return {
      raw,
      passengerName: raw.substring(2,22).trim().replace("/"," "),
      pnr:           raw.substring(23,30).trim(),
      departure:     raw.substring(30,33).trim(),
      arrival:       raw.substring(33,36).trim(),
      flightNumber:  raw.substring(36,39).trim()+raw.substring(39,44).trim(),
      seatNumber:    raw.substring(48,52).trim()
    };
  }

  // ── AFFICHAGE ─────────────────────────────────────────────────
  function showWaiting() {
    document.getElementById("waitingState").style.display="flex";
    document.getElementById("okState").style.display="none";
    document.getElementById("dejaState").style.display="none";
    document.getElementById("errState").style.display="none";
    document.getElementById("resultCard").className="result-card";
    document.getElementById("sendIndicator").textContent="";
    document.getElementById("sendIndicator").className="send-indicator";
    lastRawData="";
  }
  function showOk(data) {
    document.getElementById("waitingState").style.display="none";
    document.getElementById("okState").style.display="flex";
    document.getElementById("dejaState").style.display="none";
    document.getElementById("errState").style.display="none";
    document.getElementById("resSeat").textContent   = data.seatNumber||"—";
    document.getElementById("resName").textContent   = data.passengerName;
    document.getElementById("resFlight").textContent = `✈ ${data.flightNumber} ${data.departure} → ${data.arrival}`;
    document.getElementById("resultCard").className  = "result-card ok";
  }
  function showDeja(data, scanTime) {
    document.getElementById("waitingState").style.display="none";
    document.getElementById("okState").style.display="none";
    document.getElementById("dejaState").style.display="flex";
    document.getElementById("errState").style.display="none";
    document.getElementById("dejaName").textContent = data.passengerName + " — " + (data.seatNumber||"");
    document.getElementById("dejaSub").textContent  = scanTime ? `Déjà scanné à ${scanTime}` : "Passager déjà scanné";
    document.getElementById("resultCard").className = "result-card deja";
  }
  function showErr() {
    document.getElementById("waitingState").style.display="none";
    document.getElementById("okState").style.display="none";
    document.getElementById("dejaState").style.display="none";
    document.getElementById("errState").style.display="flex";
    document.getElementById("resultCard").className="result-card err";
  }
  function setSend(msg,type) {
    const el=document.getElementById("sendIndicator");
    el.textContent=msg; el.className="send-indicator "+type;
  }

  // ── SCAN PRINCIPAL ────────────────────────────────────────────
  async function processeScan(rawData) {
    if (!rawData||rawData.length<10) return;
    if (rawData===lastRawData) return;
    lastRawData=rawData;
    clearTimeout(resetTimer);

    let data;
    try { data=parseBCBP(rawData); }
    catch(e) {
      beep("err");
      if (navigator.vibrate) navigator.vibrate([300,100,300]);
      showErr();
      resetTimer=setTimeout(showWaiting,3000);
      return;
    }

    data.timestamp = new Date().toLocaleTimeString("fr-FR");
    data.dateStr   = new Date().toLocaleDateString("fr-FR");
    const key = data.flightNumber+"_"+data.dateStr.replace(/\//g,"_");
    const pnrKey = key+"_"+data.pnr; // Clé unique : vol + date + PNR

    // ── VÉRIFICATION DOUBLON ─────────────────────────────────
    // 1. Vérif locale instantanée (cache)
    if (scannedPNRs.has(pnrKey)) {
      beep("deja");
      if (navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
      showDeja(data, null);
      setSend("⚠ Ce passager a déjà été scanné", "deja");
      resetTimer=setTimeout(showWaiting,5000);
      return;
    }

    // 2. Vérif Firebase (fiable même entre plusieurs appareils)
    setSend("⏳ Vérification en cours...", "sending");
    try {
      const paxDocRef = doc(db,"embarquement",key,"passagers",data.pnr);
      const existingDoc = await getDoc(paxDocRef);

      if (existingDoc.exists()) {
        // Déjà dans Firebase !
        const existingData = existingDoc.data();
        beep("deja");
        if (navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
        showDeja(data, existingData.scanTime||null);
        setSend("⚠ Ce passager a déjà été scanné", "deja");
        // Ajoute au cache local pour la prochaine fois
        scannedPNRs.add(pnrKey);
        localStorage.setItem("alyziaScannedPNRs", JSON.stringify([...scannedPNRs]));
        resetTimer=setTimeout(showWaiting,5000);
        return;
      }

      // ── NOUVEAU PASSAGER → ENREGISTREMENT ────────────────
      beep("ok");
      if (navigator.vibrate) navigator.vibrate(150);
      showOk(data);
      scanCount++;
      localStorage.setItem("alyziaCount",scanCount);
      document.getElementById("counter").textContent=scanCount;
      setSend("⏳ Enregistrement...", "sending");

      // On utilise le PNR comme ID du document (clé unique naturelle)
      await setDoc(paxDocRef, {
        passengerName: data.passengerName, flightNumber: data.flightNumber,
        departure: data.departure, arrival: data.arrival,
        seatNumber: data.seatNumber, pnr: data.pnr,
        scanTime: data.timestamp, scanDate: data.dateStr,
        rawBCBP: data.raw, createdAt: serverTimestamp()
      });

      // Incrémente le compteur du vol
      await setDoc(doc(db,"embarquement",key), {
        flightNumber: data.flightNumber, departure: data.departure,
        arrival: data.arrival, date: data.dateStr,
        scannedPax: increment(1), lastUpdated: serverTimestamp()
      },{merge:true});

      // Ajoute au cache local
      scannedPNRs.add(pnrKey);
      localStorage.setItem("alyziaScannedPNRs", JSON.stringify([...scannedPNRs]));
      setSend("✓ Enregistré sur le serveur","sent");

    } catch(err) {
      // Hors ligne : on enregistre quand même localement et on laisse passer
      beep("ok");
      if (navigator.vibrate) navigator.vibrate(150);
      showOk(data);
      scanCount++;
      localStorage.setItem("alyziaCount",scanCount);
      document.getElementById("counter").textContent=scanCount;
      scannedPNRs.add(pnrKey);
      localStorage.setItem("alyziaScannedPNRs", JSON.stringify([...scannedPNRs]));
      setSend("⚠ Hors ligne — sera synchronisé","failed");
    }

    resetTimer=setTimeout(showWaiting,5000);
  }

  // ── DOUCHETTE (clavier global) ────────────────────────────────
  let scanBuffer="";
  let scanTimer=null;
  document.addEventListener("keydown",e=>{
    if (e.key==="Enter") {
      e.preventDefault();
      clearTimeout(scanTimer);
      if (scanBuffer.length>5) processeScan(scanBuffer);
      scanBuffer="";
    } else if (e.key.length===1) {
      scanBuffer+=e.key;
      clearTimeout(scanTimer);
      scanTimer=setTimeout(()=>{scanBuffer="";},150);
    }
  });

  // ── CAMÉRA ────────────────────────────────────────────────────
  async function startCamera() {
    const card=document.getElementById("cameraCard");
    card.style.display="block";
    const w=Math.min(window.innerWidth-64,380);
    html5QrCode=new Html5Qrcode("reader");
    try {
      await html5QrCode.start(
        {facingMode:"environment"},
        {fps:10,qrbox:{width:w,height:140},
          formatsToSupport:[Html5QrcodeSupportedFormats.PDF_417,Html5QrcodeSupportedFormats.AZTEC,Html5QrcodeSupportedFormats.QR_CODE]
        },
        decoded=>{
          html5QrCode.pause(true);
          processeScan(decoded);
          setTimeout(()=>{try{html5QrCode.resume();}catch(e){} },2500);
        },
        ()=>{}
      );
      document.getElementById("btnCamera").classList.add("active");
      document.getElementById("btnCameraLabel").textContent="ARRÊTER LA CAMÉRA";
      cameraActive=true;
    } catch(err) {
      card.style.display="none";
      alert("Caméra non accessible.\nAutorisez l'accès dans les réglages.");
    }
  }

  window.toggleCamera=async function() {
    if (!cameraActive) {
      await startCamera();
    } else {
      try{ await html5QrCode.stop(); }catch(e){}
      document.getElementById("cameraCard").style.display="none";
      document.getElementById("btnCamera").classList.remove("active");
      document.getElementById("btnCameraLabel").textContent="UTILISER L'APPAREIL PHOTO";
      cameraActive=false; cameraWasActive=false;
    }
  };
</script>
</body>
