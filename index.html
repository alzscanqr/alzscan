<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alyzia — Scan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --orange:#F07800;--orange-dark:#c45f00;--orange-light:#fff3e0;
      --green:#1a7a4a;--green-light:#e6f9ee;
      --red:#c0392b;--red-light:#fdecea;
      --gray-50:#f9f9f9;--gray-100:#f0f0f0;--gray-200:#e0e0e0;
      --gray-400:#9e9e9e;--gray-600:#555;--gray-900:#1a1a1a;
      --white:#fff;--font:'Inter',sans-serif;
      --radius-md:14px;--radius-lg:20px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08);
      --shadow-md:0 4px 16px rgba(0,0,0,.10);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--gray-50);color:var(--gray-900);min-height:100dvh;-webkit-font-smoothing:antialiased;touch-action:manipulation}
    button{cursor:pointer;font-family:var(--font);border:none}
    .topbar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:var(--shadow-sm)}
    .topbar img{height:32px;display:block}
    .topbar-clock{font-size:13px;font-weight:600;color:var(--gray-600);font-variant-numeric:tabular-nums}
    .page{max-width:480px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px}
    .result-card{background:var(--white);border-radius:var(--radius-lg);padding:28px 20px;box-shadow:var(--shadow-md);border:3px solid var(--gray-200);text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:border-color .3s,background .3s}
    .result-card.ok{border-color:var(--green);background:var(--green-light)}
    .result-card.err{border-color:var(--red);background:var(--red-light)}
    .result-waiting{display:flex;flex-direction:column;align-items:center;gap:10px}
    .pulse-ring{width:56px;height:56px;border-radius:50%;border:3px solid var(--orange);animation:pulse 1.8s ease-out infinite;opacity:.5}
    @keyframes pulse{0%{transform:scale(.8);opacity:.6}70%{transform:scale(1.3);opacity:0}100%{transform:scale(1.3);opacity:0}}
    .result-waiting p{font-size:15px;font-weight:600;color:var(--gray-400)}
    .result-seat{font-size:clamp(3rem,15vw,5rem);font-weight:800;color:var(--orange);line-height:1}
    .result-name{font-size:clamp(1.1rem,4vw,1.5rem);font-weight:700;color:var(--gray-900);line-height:1.2}
    .result-flight{font-size:14px;font-weight:500;color:var(--gray-600);background:var(--gray-100);padding:4px 12px;border-radius:999px;margin-top:4px}
    .result-err-icon{font-size:3rem}
    .result-err-msg{font-size:1.1rem;font-weight:700;color:var(--red)}
    .result-err-sub{font-size:13px;color:var(--gray-600)}
    .send-indicator{font-size:12px;font-weight:500;color:var(--gray-400);text-align:center;min-height:18px}
    .send-indicator.sending{color:var(--orange)}
    .send-indicator.sent{color:var(--green)}
    .send-indicator.failed{color:var(--red)}
    .counter-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:var(--white);border-radius:var(--radius-md);border:1px solid var(--gray-200)}
    .counter-row .num{font-size:2rem;font-weight:800;color:var(--orange);font-variant-numeric:tabular-nums}
    .counter-row .lbl{font-size:13px;color:var(--gray-600);font-weight:500}
    .btn-reset{font-size:11px;color:var(--gray-400);background:var(--gray-100);padding:4px 10px;border-radius:8px;margin-left:8px}
    .btn-camera{width:100%;padding:18px;border-radius:var(--radius-md);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--gray-900);color:var(--white);box-shadow:var(--shadow-md);transition:background .2s,transform .1s}
    .btn-camera:active{transform:scale(.97)}
    .btn-camera.active{background:var(--red)}
    .cam-icon{font-size:1.4rem}
    #cameraCard{display:none;border-radius:var(--radius-md);overflow:hidden;border:2px solid var(--gray-200)}
    #reader{width:100%}
    .douchette-pill{display:flex;align-items:center;gap:10px;background:var(--orange-light);border:1.5px dashed var(--orange);border-radius:var(--radius-md);padding:14px 16px}
    .douchette-pill .dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .douchette-pill p{font-size:14px;font-weight:600;color:var(--orange-dark);line-height:1.3}
    .douchette-pill p span{font-weight:400;color:var(--gray-600);font-size:13px}
    .camera-banner{display:none;background:#1a1a2e;color:white;text-align:center;padding:14px;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer}
    .camera-banner.visible{display:block}

    .login-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--gray-50)}
    .login-card{width:100%;max-width:360px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:24px;text-align:center}
    .login-card h1{font-size:24px;font-weight:800;letter-spacing:.08em;color:var(--orange);margin-bottom:6px}
    .login-card p{font-size:14px;color:var(--gray-600);margin-bottom:14px}
    .login-card label{display:block;text-align:left;font-size:11px;font-weight:800;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
    .login-card input{width:100%;padding:13px 14px;border:1.5px solid var(--gray-200);border-radius:12px;font-family:var(--font);font-size:15px}
    .login-card button{width:100%;margin-top:16px;padding:13px 16px;border-radius:12px;background:var(--orange);color:var(--white);font-weight:800;font-size:15px}
    .login-error{min-height:18px;margin-top:10px;color:var(--red);font-size:13px;font-weight:600}
    .topbar-actions{display:flex;align-items:center;gap:8px}
    .user-chip{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--gray-600);font-weight:600}
    .btn-logout{background:var(--gray-100);color:var(--gray-600);font-size:11px;font-weight:700;padding:6px 8px;border-radius:8px}
    .result-card.warn{border-color:var(--orange);background:var(--orange-light)}
    .result-dup-icon{font-size:3rem}
    .result-dup-msg{font-size:1.1rem;font-weight:800;color:var(--orange-dark)}
    .result-dup-sub{font-size:13px;color:var(--gray-600)}
    @media(max-width:420px){.user-chip{display:none}.topbar{padding:0 12px}.btn-logout{padding:6px}}

  </style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h1>ALYZIA</h1>
    <p>Connexion</p>
    <form id="loginForm" autocomplete="on">
      <label for="loginEmail">Email</label>
      <input id="loginEmail" type="email" autocomplete="username" required>
      <label for="loginPassword">Mot de passe</label>
      <input id="loginPassword" type="password" autocomplete="current-password" required>
      <button id="loginBtn" type="submit">Se connecter</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>
</div>

<div id="appShell" style="display:none">

  function normalizeKey(value) {
    return String(value || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^A-Z0-9]+/gi, "_")
      .replace(/^_+|_+$/g, "")
      .toUpperCase();
  }

  function hashString(value) {
    let hash = 5381;
    for (let i = 0; i < value.length; i++) {
      hash = ((hash << 5) + hash) + value.charCodeAt(i);
      hash = hash >>> 0;
    }
    return hash.toString(36).toUpperCase();
  }

  function buildFlightKey(data) {
    return `${normalizeKey(data.flightNumber)}_${data.dateStr.replace(/\//g, "_")}`;
  }

  function buildPassengerId(data) {
    const base = [
      data.flightNumber,
      data.dateStr,
      data.pnr,
      data.seatNumber,
      data.passengerName
    ].map(normalizeKey).filter(Boolean).join("_");

    return `${base || "PAX"}_${hashString(data.raw)}`;
  }

  function setLoginError(message = "") {
    $("loginError").textContent = message;
  }

  $("loginForm").addEventListener("submit", async (event) => {
    event.preventDefault();
    setLoginError("");

    const email = $("loginEmail").value.trim();
    const password = $("loginPassword").value;

    if (!email || !password) {
      setLoginError("Email et mot de passe requis.");
      return;
    }

    $("loginBtn").disabled = true;
    $("loginBtn").textContent = "Connexion...";

    try {
      await signInWithEmailAndPassword(auth, email, password);
      $("loginPassword").value = "";
    } catch (error) {
      setLoginError("Identifiants invalides ou accès refusé.");
    } finally {
      $("loginBtn").disabled = false;
      $("loginBtn").textContent = "Se connecter";
    }
  });

  $("logoutBtn").addEventListener("click", async () => {
    if (cameraActive && html5QrCode) {
      try { await html5QrCode.stop(); } catch (error) {}
      cameraActive = false;
    }
    await signOut(auth);
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      $("loginScreen").style.display = "none";
      $("appShell").style.display = "block";
      $("userEmail").textContent = user.email || "";
      setSend("", "");
      showWaiting();
    } else {
      $("appShell").style.display = "none";
      $("loginScreen").style.display = "flex";
      $("userEmail").textContent = "";
      lastRawData = "";
    }
  });

  window.resetCounter = function() {
    if (confirm("Remettre le compteur à 0 ?")) {
      scanCount = 0;
      localStorage.setItem("alyziaCount", "0");
      $("counter").textContent = "0";
    }
  };

  setInterval(() => {
    $("clock").textContent = localTimeFr();
  }, 1000);
  $("clock").textContent = localTimeFr();

  document.addEventListener("visibilitychange", async () => {
    if (document.hidden) {
      if (cameraActive && html5QrCode) {
        cameraWasActive = true;
        try { await html5QrCode.stop(); } catch(error) {}
        cameraActive = false;
        $("cameraCard").style.display = "none";
      }
    } else if (cameraWasActive && auth.currentUser) {
      $("cameraBanner").classList.add("visible");
      $("btnCamera").classList.remove("active");
      $("btnCameraLabel").textContent = "UTILISER L'APPAREIL PHOTO";
    }
  });

  window.restartCamera = async function() {
    if (!auth.currentUser) {
      setSend("Connexion requise.", "failed");
      return;
    }
    $("cameraBanner").classList.remove("visible");
    cameraWasActive = false;
    await startCamera();
  };

  function beep(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === "ok") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(1200, ctx.currentTime);
        gain.gain.setValueAtTime(0.8, ctx.currentTime);
        osc.start();
        osc.stop(ctx.currentTime + 0.12);
      } else {
        osc.type = "square";
        osc.frequency.setValueAtTime(220, ctx.currentTime);
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        osc.start();
        osc.stop(ctx.currentTime + 0.25);
      }
    } catch(error) {}
  }

  function cleanField(value) {
    return String(value || "").replace(/\s+/g, " ").trim();
  }

  function parseBCBP(raw) {
    raw = String(raw || "").trim();

    if (!raw.startsWith("M")) {
      throw new Error("Non-BCBP");
    }

    if (raw.length < 60) {
      throw new Error("BCBP trop court");
    }

    const passengerName = cleanField(raw.substring(2, 22).replace("/", " "));
    const pnr = cleanField(raw.substring(23, 30));
    const departure = cleanField(raw.substring(30, 33)).toUpperCase();
    const arrival = cleanField(raw.substring(33, 36)).toUpperCase();
    const carrier = cleanField(raw.substring(36, 39)).toUpperCase();
    const flightNumber = `${carrier}${cleanField(raw.substring(39, 44))}`.replace(/\s+/g, "").toUpperCase();
    const seatNumber = cleanField(raw.substring(48, 52)).toUpperCase();

    if (passengerName.length < 2) throw new Error("Nom absent");
    if (pnr.length < 5) throw new Error("PNR absent");
    if (!/^[A-Z0-9]{3}$/.test(departure)) throw new Error("Départ invalide");
    if (!/^[A-Z0-9]{3}$/.test(arrival)) throw new Error("Arrivée invalide");
    if (flightNumber.length < 4) throw new Error("Vol absent");
    if (!seatNumber) throw new Error("Siège absent");

    return {
      raw,
      passengerName,
      pnr,
      departure,
      arrival,
      flightNumber,
      seatNumber
    };
  }

  function hideAllStates() {
    $("waitingState").style.display = "none";
    $("okState").style.display = "none";
    $("errState").style.display = "none";
    $("dupState").style.display = "none";
  }

  function showOk(data) {
    hideAllStates();
    $("okState").style.display = "flex";
    $("resSeat").textContent = data.seatNumber || "—";
    $("resName").textContent = data.passengerName;
    $("resFlight").textContent = `✈ ${data.flightNumber} ${data.departure} → ${data.arrival}`;
    $("resultCard").className = "result-card ok";
  }

  function showDuplicate(data) {
    hideAllStates();
    $("dupState").style.display = "flex";
    $("dupSeat").textContent = data.seatNumber || "—";
    $("dupName").textContent = data.passengerName;
    $("dupFlight").textContent = `✈ ${data.flightNumber} ${data.departure} → ${data.arrival}`;
    $("resultCard").className = "result-card warn";
  }

  function showErr() {
    hideAllStates();
    $("errState").style.display = "flex";
    $("resultCard").className = "result-card err";
  }

  function showWaiting() {
    $("waitingState").style.display = "flex";
    $("okState").style.display = "none";
    $("errState").style.display = "none";
    $("dupState").style.display = "none";
    $("resultCard").className = "result-card";
    $("sendIndicator").textContent = "";
    $("sendIndicator").className = "send-indicator";
    lastRawData = "";
  }

  function setSend(msg, type) {
    const el = $("sendIndicator");
    el.textContent = msg || "";
    el.className = type ? `send-indicator ${type}` : "send-indicator";
  }

  async function saveScan(data) {
    const now = new Date();
    data.timestamp = localTimeFr(now);
    data.dateStr = localDateFr(now);

    const flightKey = buildFlightKey(data);
    const passengerId = buildPassengerId(data);
    const flightRef = doc(db, COLLECTION_NAME, flightKey);
    const passengerRef = doc(db, COLLECTION_NAME, flightKey, "passagers", passengerId);

    let duplicate = false;

    await runTransaction(db, async (transaction) => {
      const existingPassenger = await transaction.get(passengerRef);

      if (existingPassenger.exists()) {
        duplicate = true;
        return;
      }

      transaction.set(flightRef, {
        flightNumber: data.flightNumber,
        departure: data.departure,
        arrival: data.arrival,
        date: data.dateStr,
        scannedPax: increment(1),
        lastUpdated: serverTimestamp()
      }, { merge: true });

      transaction.set(passengerRef, {
        passengerName: data.passengerName,
        flightNumber: data.flightNumber,
        departure: data.departure,
        arrival: data.arrival,
        seatNumber: data.seatNumber,
        pnr: data.pnr,
        scanTime: data.timestamp,
        scanDate: data.dateStr,
        rawBCBP: data.raw,
        source: "scanner",
        createdBy: auth.currentUser ? auth.currentUser.email : null,
        createdAt: serverTimestamp()
      });
    });

    return { duplicate, flightKey, passengerId };
  }

  async function processeScan(rawData) {
    if (!auth.currentUser) {
      setSend("Connexion requise.", "failed");
      return;
    }

    if (!rawData || rawData.length < 10) return;
    if (rawData === lastRawData) return;

    lastRawData = rawData;
    clearTimeout(resetTimer);

    let data;

    try {
      data = parseBCBP(rawData);
    } catch(error) {
      beep("err");
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      showErr();
      setSend("Code non reconnu.", "failed");
      resetTimer = setTimeout(showWaiting, 3000);
      return;
    }

    showOk(data);
    setSend("⏳ Envoi au serveur...", "sending");

    try {
      const result = await saveScan(data);

      if (result.duplicate) {
        beep("err");
        if (navigator.vibrate) navigator.vibrate([180, 80, 180]);
        showDuplicate(data);
        setSend("Déjà enregistré — non compté.", "failed");
      } else {
        beep("ok");
        if (navigator.vibrate) navigator.vibrate(150);
        scanCount++;
        localStorage.setItem("alyziaCount", String(scanCount));
        $("counter").textContent = scanCount;
        setSend("✓ Enregistré sur le serveur", "sent");
      }
    } catch(error) {
      console.error(error);
      beep("err");
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      setSend("Erreur serveur — scan non enregistré.", "failed");
    }

    resetTimer = setTimeout(showWaiting, 5000);
  }

  let scanBuffer = "";
  let scanTimer = null;

  document.addEventListener("keydown", (event) => {
    if (!auth.currentUser) return;

    if (event.key === "Enter") {
      event.preventDefault();
      clearTimeout(scanTimer);

      if (scanBuffer.length > 5) {
        processeScan(scanBuffer);
      }

      scanBuffer = "";
    } else if (event.key.length === 1) {
      scanBuffer += event.key;
      clearTimeout(scanTimer);
      scanTimer = setTimeout(() => {
        scanBuffer = "";
      }, 150);
    }
  });

  async function startCamera() {
    if (!auth.currentUser) {
      setSend("Connexion requise.", "failed");
      return;
    }

    const card = $("cameraCard");
    card.style.display = "block";
    const width = Math.min(window.innerWidth - 64, 380);
    html5QrCode = new Html5Qrcode("reader");

    try {
      await html5QrCode.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: { width, height: 140 },
          formatsToSupport: [
            Html5QrcodeSupportedFormats.PDF_417,
            Html5QrcodeSupportedFormats.AZTEC,
            Html5QrcodeSupportedFormats.QR_CODE
          ]
        },
        (decoded) => {
          html5QrCode.pause(true);
          processeScan(decoded);
          setTimeout(() => {
            try { html5QrCode.resume(); } catch(error) {}
          }, 2500);
        },
        () => {}
      );

      $("btnCamera").classList.add("active");
      $("btnCameraLabel").textContent = "ARRÊTER LA CAMÉRA";
      cameraActive = true;
    } catch(error) {
      card.style.display = "none";
      alert("Caméra non accessible.\nAutorisez l'accès dans les réglages du navigateur.");
    }
  }

  window.toggleCamera = async function() {
    if (!auth.currentUser) {
      setSend("Connexion requise.", "failed");
      return;
    }

    if (!cameraActive) {
      await startCamera();
    } else {
      try { await html5QrCode.stop(); } catch(error) {}
      $("cameraCard").style.display = "none";
      $("btnCamera").classList.remove("active");
      $("btnCameraLabel").textContent = "UTILISER L'APPAREIL PHOTO";
      cameraActive = false;
      cameraWasActive = false;
    }
  };
</script>
</body>
